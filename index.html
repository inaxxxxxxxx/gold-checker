<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金・プラチナ価格 — 田中貴金属</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f8f7f4;
    --surface:  #ffffff;
    --border:   rgba(0,0,0,0.08);
    --text:     #0b0b0b;
    --muted:    #888780;
    --gold:     #c9a227;
    --plat:     #9e9e9e;
    --up:       #0ca30c;
    --dn:       #d03b3b;
    --radius:   10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #141413;
      --surface: #1e1e1c;
      --border:  rgba(255,255,255,0.08);
      --text:    #f0efec;
      --muted:   #888780;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  .container { max-width: 720px; margin: 0 auto; }

  h1 {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1 .source {
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
  }

  /* KPIカード */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .kpi-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .kpi-value {
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
  }
  .kpi-unit { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .kpi-delta { font-size: 12px; margin-top: 5px; }
  .up { color: var(--up); }
  .dn { color: var(--dn); }

  /* コントロール */
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .seg {
    display: flex;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .seg button {
    font-size: 12px;
    padding: 5px 13px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
  }
  .seg button.active {
    background: var(--text);
    color: var(--bg);
  }
  .refresh-btn {
    margin-left: auto;
    font-size: 12px;
    padding: 5px 13px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
  }
  .refresh-btn:hover { color: var(--text); }

  /* チャート */
  .chart-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .legend {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chart-canvas-wrap { position: relative; height: 260px; }

  /* ステータス */
  .status {
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    text-align: right;
  }
  .status a { color: var(--muted); }

  /* エラー */
  .error {
    display: none;
    background: #fcebeb;
    color: #a32d2d;
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
  }

  /* スケルトン */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .skeleton { animation: pulse 1.5s ease-in-out infinite; background: var(--border); border-radius: 4px; display: inline-block; }
</style>
</head>
<body>
<div class="container">
  <h1>
    金・プラチナ価格
    <span class="source">田中貴金属工業</span>
  </h1>

  <div class="error" id="errorBox"></div>

  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label" style="color: var(--gold);">● 金（Gold）</div>
      <div class="kpi-value" id="goldVal">—</div>
      <div class="kpi-unit">円 / グラム（税込小売）</div>
      <div class="kpi-delta" id="goldDelta">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label" style="color: var(--plat);">● プラチナ（Platinum）</div>
      <div class="kpi-value" id="platVal">—</div>
      <div class="kpi-unit">円 / グラム（税込小売）</div>
      <div class="kpi-delta" id="platDelta">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">金 / プラチナ 比率</div>
      <div class="kpi-value" id="ratioVal">—</div>
      <div class="kpi-unit">倍（金がプラチナの何倍か）</div>
    </div>
  </div>

  <div class="controls">
    <div class="seg" id="periodSeg">
      <button data-n="14" class="active">2W</button>
      <button data-n="30">1M</button>
      <button data-n="999">全期間</button>
    </div>
    <button class="refresh-btn" id="refreshBtn">↻ 更新</button>
  </div>

  <div class="chart-wrap">
    <div class="legend">
      <span><span class="dot" style="background:var(--gold)"></span>金（小売）</span>
      <span><span class="dot" style="background:var(--plat); border: 1px dashed #9e9e9e;"></span>プラチナ（小売）</span>
    </div>
    <div class="chart-canvas-wrap">
      <canvas id="chart" role="img" aria-label="田中貴金属の金・プラチナ価格推移（円/グラム）">田中貴金属の金・プラチナ価格推移グラフ</canvas>
    </div>
  </div>

  <p class="status" id="statusText">
    データを取得中...
  </p>
</div>

<script>
// ============================================================
// ★ デプロイ後にProxyのURLをここに設定する
// 例: 'https://your-project.vercel.app/api/prices'
// ローカル確認時は 'http://localhost:3000/api/prices'
// ============================================================
const PROXY_URL = 'https://your-project.vercel.app/api/prices';

let chartInstance = null;
let allData = null;
let displayN = 14; // 表示する日数

// ---------- データ取得 ----------
async function load() {
  setStatus('取得中...');
  hideError();
  try {
    const res = await fetch(PROXY_URL);
    if (!res.ok) throw new Error(`Proxy返却エラー: HTTP ${res.status}`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Proxy内部エラー');

    allData = json;
    render();
    setStatus(`最終更新: ${new Date(json.fetched_at).toLocaleString('ja-JP')} ｜ データ: <a href="https://gold.tanaka.co.jp/commodity/souba/" target="_blank">田中貴金属工業</a>`);
  } catch (e) {
    showError(`取得失敗: ${e.message}`);
    setStatus('');
  }
}

// ---------- 描画 ----------
function render() {
  if (!allData) return;
  const { latest, history } = allData;

  // KPI
  setKpi('goldVal', 'goldDelta', latest.gold);
  setKpi('platVal', 'platDelta', latest.platinum);

  if (latest.gold && latest.platinum) {
    document.getElementById('ratioVal').textContent =
      (latest.gold.retail / latest.platinum.retail).toFixed(2) + 'x';
  }

  // チャート
  const goldRows = slice(history.gold, displayN);
  const platRows = slice(history.platinum, displayN);

  const labels = goldRows.map(r => r.date.replace(/^\d{4}\//, '')); // MM/DD
  const goldData = goldRows.map(r => r.retail);
  const platData = platRows.map(r => r.retail);

  drawChart(labels, goldData, platData);
}

function slice(rows, n) {
  if (!rows) return [];
  return n >= 999 ? rows : rows.slice(-n);
}

function setKpi(valId, deltaId, row) {
  const valEl = document.getElementById(valId);
  const dEl = document.getElementById(deltaId);
  if (!row) { valEl.textContent = '—'; dEl.textContent = '—'; return; }

  valEl.textContent = row.retail.toLocaleString('ja-JP');

  if (allData && allData.history) {
    const key = valId.startsWith('gold') ? 'gold' : 'platinum';
    const rows = allData.history[key];
    if (rows && rows.length >= 2) {
      const prev = rows[rows.length - 2].retail;
      const chg = row.retail - prev;
      const pct = ((chg / prev) * 100).toFixed(2);
      const sign = chg >= 0 ? '+' : '';
      dEl.textContent = `前日比 ${sign}${chg.toLocaleString('ja-JP')}円 (${sign}${pct}%)`;
      dEl.className = 'kpi-delta ' + (chg >= 0 ? 'up' : 'dn');
    }
  }
}

function drawChart(labels, goldData, platData) {
  const canvas = document.getElementById('chart');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '金',
          data: goldData,
          borderColor: '#c9a227',
          backgroundColor: 'rgba(201,162,39,0.07)',
          borderWidth: 2,
          pointRadius: goldData.length <= 20 ? 3 : 0,
          pointHoverRadius: 5,
          pointBackgroundColor: '#c9a227',
          tension: 0.3,
          fill: true,
          yAxisID: 'yG',
        },
        {
          label: 'プラチナ',
          data: platData,
          borderColor: '#9e9e9e',
          backgroundColor: 'rgba(158,158,158,0.07)',
          borderWidth: 2,
          borderDash: [5, 3],
          pointRadius: platData.length <= 20 ? 3 : 0,
          pointHoverRadius: 5,
          pointBackgroundColor: '#9e9e9e',
          tension: 0.3,
          fill: true,
          yAxisID: 'yP',
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ¥${ctx.raw.toLocaleString('ja-JP')}/g`,
          },
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(136,135,128,0.12)' },
          ticks: { color: '#888780', font: { size: 11 }, maxTicksLimit: 8, autoSkip: true },
        },
        yG: {
          position: 'left',
          grid: { color: 'rgba(136,135,128,0.12)' },
          ticks: { color: '#c9a227', font: { size: 11 }, callback: v => '¥' + v.toLocaleString('ja-JP') },
        },
        yP: {
          position: 'right',
          grid: { display: false },
          ticks: { color: '#9e9e9e', font: { size: 11 }, callback: v => '¥' + v.toLocaleString('ja-JP') },
        },
      },
    },
  });
}

// ---------- UI helpers ----------
function setStatus(html) { document.getElementById('statusText').innerHTML = html; }
function showError(msg) { const el = document.getElementById('errorBox'); el.textContent = msg; el.style.display = 'block'; }
function hideError() { document.getElementById('errorBox').style.display = 'none'; }

// ---------- イベント ----------
document.getElementById('periodSeg').addEventListener('click', e => {
  const btn = e.target.closest('button[data-n]');
  if (!btn) return;
  document.querySelectorAll('#periodSeg button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  displayN = parseInt(btn.dataset.n, 10);
  render();
});

document.getElementById('refreshBtn').addEventListener('click', load);

// 初回ロード
load();
</script>
</body>
</html>
